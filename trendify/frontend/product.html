<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Trendify</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/chatbot.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
   <a href="index.html" class="logo">Trendify</a>
    <div class="header-search">
      <input type="search" placeholder="Search products...">
      <button class="search-btn-icon">🔍</button>
    </div>
    <div class="header-actions">
      <a href="login.html" class="btn btn-outline btn-sm" id="nav-login">Sign In</a>
      <div class="nav-user-btn" id="nav-user" style="display:none">
        👤 <span id="nav-user-name">User</span> ▾
        <div class="nav-dropdown">
          <a href="orders.html">My Orders</a>
          <a href="wishlist.html">Wishlist</a>
          <hr>
          <a href="admin.html" id="nav-admin" style="display:none">⚙ Admin</a>
          <button data-logout>Sign Out</button>
        </div>
      </div>
      <a href="cart.html" class="header-icon-btn">🛍<span class="header-badge cart-count">0</span></a>
    </div>
  </div>
</header>

<main>
  <div class="container section">
    <!-- Breadcrumb -->
    <nav style="margin-bottom:32px; font-size:0.85rem; color:var(--text-dim)">
      <a href="index.html" style="color:var(--text-muted)">Home</a> /
      <a href="shop.html" style="color:var(--text-muted)">Shop</a> /
      <span id="breadcrumb-name">Product</span>
    </nav>

    <div id="product-detail">
      <!-- Loading state -->
      <div class="product-detail-grid">
        <div class="skeleton" style="aspect-ratio:4/5; border-radius:16px;"></div>
        <div>
          <div class="skeleton" style="height:48px; margin-bottom:16px; border-radius:8px;"></div>
          <div class="skeleton" style="height:24px; width:60%; margin-bottom:32px; border-radius:8px;"></div>
          <div class="skeleton" style="height:100px; border-radius:8px;"></div>
        </div>
      </div>
    </div>

    <!-- Related Products -->
    <div id="related-section" style="display:none; margin-top:80px;">
      <div class="section-header-inline">
        <div>
          <span class="section-label">You May Also Like</span>
          <h2>Related Products</h2>
        </div>
      </div>
      <div class="products-grid" id="related-products"></div>
    </div>

    <!-- Reviews Section -->
    <div id="reviews-section" style="margin-top:80px;">
      <div class="section-header-inline">
        <div>
          <span class="section-label">Feedback</span>
          <h2>Customer Reviews</h2>
        </div>
      </div>
      <div id="reviews-container" style="max-width:720px;"></div>

      <!-- Leave a Review -->
      <div id="review-form-wrap" style="margin-top:40px; max-width:520px; display:none;">
        <h3 style="margin-bottom:20px; font-size:1.2rem;">Leave a Review</h3>
        <div class="card card-body">
          <div class="form-group">
            <label>Rating</label>
            <div id="star-input" style="display:flex; gap:8px; font-size:1.8rem; cursor:pointer; color:var(--text-dim);">
              <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
            </div>
            <input type="hidden" id="review-rating" value="0">
          </div>
          <div class="form-group">
            <label>Comment (optional)</label>
            <textarea id="review-comment" class="form-input" rows="3" placeholder="Share your experience..."></textarea>
          </div>
          <button class="btn btn-gold btn-full" onclick="submitReview()">Submit Review</button>
        </div>
      </div>
      <div id="review-login-prompt" style="display:none; margin-top:24px;">
        <a href="login.html" class="btn btn-outline">Sign in to leave a review</a>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-bottom"><p>© 2024 Trendify. All rights reserved.</p></div>
</footer>

<script src="assets/js/api.js"></script>
<script>
const productId = new URLSearchParams(window.location.search).get('id');
if (!productId) window.location.href = 'shop.html';

let selectedQty = 1;
let selectedRating = 0;

async function loadProduct() {
  try {
    const data = await api.get(`/products/${productId}`);
    const { product, reviews, related } = data;

    document.title = `${product.name} — Trendify`;
    document.getElementById('breadcrumb-name').textContent = product.name;

    const discount = product.original_price
      ? Math.round((1 - product.price / product.original_price) * 100) : null;

    const stockClass = product.stock === 0 ? 'out' : product.stock < 5 ? 'low' : '';
    const stockText = product.stock === 0 ? 'Out of Stock' : product.stock < 5 ? `Only ${product.stock} left` : 'In Stock';

    document.getElementById('product-detail').innerHTML = `
      <div class="product-detail-grid">
        <div class="product-gallery">
          <img class="main-img" src="${product.image || 'https://via.placeholder.com/600x750?text=Product'}"
               alt="${product.name}" id="main-product-img">
        </div>

        <div class="product-detail-info">
          <span class="section-label" style="margin-bottom:8px;">${product.category_name || ''}</span>
          <h1>${product.name}</h1>

          <div class="product-rating" style="margin:12px 0 4px;">
            ${renderStars(product.rating || 0)}
            <span style="font-size:0.85rem; color:var(--text-dim); margin-left:8px;">${product.rating || 0} (${product.review_count || 0} reviews)</span>
          </div>

          <div class="detail-price">
            ${formatPrice(product.price)}
            ${product.original_price ? `<del>${formatPrice(product.original_price)}</del>` : ''}
            ${discount ? `<span class="badge badge-green" style="font-size:0.85rem; margin-left:8px;">-${discount}%</span>` : ''}
          </div>

          ${product.description ? `<p style="color:var(--text-muted); line-height:1.8; margin-bottom:24px;">${product.description}</p>` : ''}

          <span class="stock-tag ${stockClass}" style="display:block; margin-bottom:20px;">● ${stockText}</span>

          <div class="product-qty-section">
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty(-1)">−</button>
              <input type="number" class="qty-input" id="qty-display" value="1" min="1" max="${product.stock}" onchange="selectedQty = parseInt(this.value)">
              <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
            <button class="btn btn-gold" id="add-cart-btn"
              onclick="addToCart(${product.id})"
              ${product.stock === 0 ? 'disabled' : ''}>
              🛍 Add to Cart
            </button>
            <button class="btn btn-dark btn-icon" onclick="addToWishlist(${product.id})" title="Add to Wishlist">♡</button>
          </div>

          <hr class="divider">

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; font-size:0.85rem; color:var(--text-muted);">
            <div>🚚 Free shipping on orders ₹4,565+</div>
            <div>↩ 30-day easy returns</div>
            <div>🔒 Secure checkout</div>
            <div>✓ Authenticity guaranteed</div>
          </div>
        </div>
      </div>
    `;

    // Max stock
    document.getElementById('qty-display').max = product.stock;

    // Related products
    if (related.length > 0) {
      document.getElementById('related-section').style.display = 'block';
      document.getElementById('related-products').innerHTML = related.map(p => `
        <div class="product-card" onclick="window.location='product.html?id=${p.id}'">
          <div class="product-img-wrap">
            <img src="${p.image || 'https://via.placeholder.com/400x500'}" alt="${p.name}" loading="lazy">
          </div>
          <div class="product-info">
            <p class="product-cat">${p.category_name || ''}</p>
            <h3 class="product-name">${p.name}</h3>
            <div class="product-price-row">
              <span class="product-price">${formatPrice(p.price)}</span>
              ${p.original_price ? `<span class="product-original">${formatPrice(p.original_price)}</span>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    // Reviews
    renderReviews(reviews);

    // Show review form
    if (Auth.isLoggedIn()) {
      document.getElementById('review-form-wrap').style.display = 'block';
      setupStarInput();
    } else {
      document.getElementById('review-login-prompt').style.display = 'block';
    }

  } catch(e) {
    document.getElementById('product-detail').innerHTML = `
      <div class="empty-state"><div class="icon">⚠</div><h3>Product not found</h3><p>${e.message}</p></div>
    `;
  }
}

function renderReviews(reviews) {
  const container = document.getElementById('reviews-container');
  if (!reviews.length) {
    container.innerHTML = '<p style="color:var(--text-muted)">No reviews yet. Be the first!</p>';
    return;
  }
  container.innerHTML = reviews.map(r => `
    <div style="padding:20px 0; border-bottom:1px solid var(--border);">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <div style="display:flex; align-items:center; gap:12px;">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--bg-subtle);display:flex;align-items:center;justify-content:center;color:var(--gold);">
            ${r.user_name[0].toUpperCase()}
          </div>
          <div>
            <strong style="font-size:0.9rem;">${r.user_name}</strong>
            <div style="font-size:0.75rem; color:var(--text-dim);">${new Date(r.created_at).toLocaleDateString()}</div>
          </div>
        </div>
        <span class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
      </div>
      ${r.comment ? `<p style="color:var(--text-muted); font-size:0.9rem; line-height:1.6;">${r.comment}</p>` : ''}
    </div>
  `).join('');
}

function setupStarInput() {
  const stars = document.querySelectorAll('#star-input span');
  stars.forEach(s => {
    s.addEventListener('mouseenter', () => {
      stars.forEach((x, i) => x.style.color = i < s.dataset.v ? 'var(--gold)' : 'var(--text-dim)');
    });
    s.addEventListener('click', () => {
      selectedRating = parseInt(s.dataset.v);
      document.getElementById('review-rating').value = selectedRating;
      stars.forEach((x, i) => x.style.color = i < selectedRating ? 'var(--gold)' : 'var(--text-dim)');
    });
  });
  document.getElementById('star-input').addEventListener('mouseleave', () => {
    stars.forEach((x, i) => x.style.color = i < selectedRating ? 'var(--gold)' : 'var(--text-dim)');
  });
}

function changeQty(delta) {
  const input = document.getElementById('qty-display');
  const newVal = Math.max(1, Math.min(parseInt(input.max), parseInt(input.value) + delta));
  input.value = newVal;
  selectedQty = newVal;
}

async function addToCart(id) {
  if (!Auth.isLoggedIn()) { showToast('Please sign in first', 'info'); window.location.href = 'login.html'; return; }
  try {
    const data = await api.post('/cart/add', { product_id: id, quantity: selectedQty });
    showToast(`Added ${selectedQty} item(s) to cart!`, 'success');
    document.querySelectorAll('.cart-count').forEach(el => el.textContent = data.cartCount);
  } catch(e) { showToast(e.message, 'error'); }
}

async function addToWishlist(id) {
  if (!Auth.isLoggedIn()) { showToast('Please sign in first', 'info'); return; }
  try {
    const data = await api.post('/cart/wishlist/add', { product_id: id });
    showToast(data.message, 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

async function submitReview() {
  if (selectedRating === 0) { showToast('Please select a star rating', 'error'); return; }
  const comment = document.getElementById('review-comment').value.trim();
  try {
    await api.post('/orders/reviews', { product_id: productId, rating: selectedRating, comment });
    showToast('Review submitted!', 'success');
    document.getElementById('review-form-wrap').style.display = 'none';
    loadProduct();
  } catch(e) { showToast(e.message, 'error'); }
}

loadProduct();
</script>
<script src="assets/js/chatbot.js"></script>
</body>
</html>
